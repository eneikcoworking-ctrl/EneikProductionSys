server.port=${SERVER_PORT:8080}
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/eneik_db;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

project-factory.workspace-root=${PROJECT_FACTORY_WORKSPACE_ROOT:./project-workspaces}

github.enabled=${GITHUB_ENABLED:false}
github.token=${GITHUB_TOKEN:}
github.org=${GITHUB_ORG:}
github.api-base-url=${GITHUB_API_BASE_URL:https://api.github.com}
github.webhook-url=${GITHUB_WEBHOOK_URL:}

linear.enabled=${LINEAR_ENABLED:false}
linear.api-key=${LINEAR_API_KEY:}
linear.team-id=${LINEAR_TEAM_ID:}
linear.api-url=${LINEAR_API_URL:https://api.linear.app/graphql}
