server.port=${SERVER_PORT:8080}
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/eneik_db;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

project-factory.workspace-root=${PROJECT_FACTORY_WORKSPACE_ROOT:./project-workspaces}
eneik.operator.system-repo-root=${ENEIK_OPERATOR_SYSTEM_REPO_ROOT:}
eneik.operator.memory-root=${ENEIK_OPERATOR_MEMORY_ROOT:./data/operator-memory}
eneik.operator.allow-mutating-tools=${ENEIK_OPERATOR_ALLOW_MUTATING_TOOLS:false}
eneik.operator.docker-compose-project-name=${ENEIK_OPERATOR_DOCKER_COMPOSE_PROJECT_NAME:}
eneik.operator.max-tool-rounds=${ENEIK_OPERATOR_MAX_TOOL_ROUNDS:3}
eneik.operator.answer-critic-enabled=${ENEIK_OPERATOR_ANSWER_CRITIC_ENABLED:true}

google-ai.api-key=${GOOGLE_AI_API_KEY:}
google-ai.interactions-url=${GOOGLE_AI_INTERACTIONS_URL:https://generativelanguage.googleapis.com/v1beta/interactions}
google-ai.models-url=${GOOGLE_AI_MODELS_URL:https://generativelanguage.googleapis.com/v1beta/models}
google-ai.request-timeout-seconds=${GOOGLE_AI_REQUEST_TIMEOUT_SECONDS:120}

gemini.model=${GEMINI_MODEL:gemini-3.5-flash}
gemini.fallback-models=${GEMINI_FALLBACK_MODELS:gemini-3.1-flash-lite,gemini-2.5-flash}
gemini.pro-model=${GEMINI_PRO_MODEL:gemini-3.1-pro-preview}
gemini.pro-fallback-models=${GEMINI_PRO_FALLBACK_MODELS:gemini-3.5-flash,gemini-2.5-flash}
google-search-grounding.enabled=${GOOGLE_SEARCH_GROUNDING_ENABLED:true}
url-context.enabled=${URL_CONTEXT_ENABLED:true}

design-service.enabled=${DESIGN_SERVICE_ENABLED:true}
design-service.asset-root=${DESIGN_ASSET_ROOT:./data/design-assets}
nano-banana.enabled=${NANO_BANANA_ENABLED:true}
nano-banana.model=${NANO_BANANA_MODEL:gemini-3.1-flash-image}
nano-banana.pro-model=${NANO_BANANA_PRO_MODEL:gemini-3-pro-image}
veo.enabled=${VEO_ENABLED:false}
veo.model=${VEO_MODEL:veo-3.1-generate-preview}

antigravity.enabled=${ANTIGRAVITY_ENABLED:false}
antigravity.push-enabled=${ANTIGRAVITY_PUSH_ENABLED:false}
antigravity.agent=${ANTIGRAVITY_AGENT:antigravity-preview-05-2026}
antigravity.api-key=${ANTIGRAVITY_API_KEY:}
antigravity.api-url=${ANTIGRAVITY_API_URL:https://generativelanguage.googleapis.com/v1beta/interactions}
antigravity.request-timeout-seconds=${ANTIGRAVITY_REQUEST_TIMEOUT_SECONDS:300}

github.enabled=${GITHUB_ENABLED:false}
github.token=${GITHUB_TOKEN:}
github.org=${GITHUB_ORG:eneikcoworking-ctrl}
github.api-base-url=${GITHUB_API_BASE_URL:https://api.github.com}
github.webhook-url=${GITHUB_WEBHOOK_URL:}

linear.enabled=${LINEAR_ENABLED:false}
linear.api-key=${LINEAR_API_KEY:}
linear.team-id=${LINEAR_TEAM_ID:}
linear.api-url=${LINEAR_API_URL:https://api.linear.app/graphql}
