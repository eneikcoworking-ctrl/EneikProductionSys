services:
  ml:
    build:
      context: ./src/models/ml
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_API_VERSION: ${GEMINI_API_VERSION:-v1beta}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      GEMINI_FALLBACK_MODELS: ${GEMINI_FALLBACK_MODELS:-gemini-3.1-flash-lite,gemini-2.5-flash}
      GEMINI_REQUEST_TIMEOUT_SECONDS: ${GEMINI_REQUEST_TIMEOUT_SECONDS:-10}
    ports:
      - "8000:8000"
    volumes:
      - .:/project
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      ML_SERVICE_URL: http://ml:8000
      SPRING_DATASOURCE_URL: jdbc:h2:file:./data/eneik_db;DB_CLOSE_DELAY=-1
      PROJECT_FACTORY_WORKSPACE_ROOT: /app/project-workspaces
      GITHUB_ENABLED: ${GITHUB_ENABLED:-false}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_ORG: ${GITHUB_ORG:-eneikcoworking-ctrl}
      GITHUB_API_BASE_URL: ${GITHUB_API_BASE_URL:-https://api.github.com}
      GITHUB_WEBHOOK_URL: ${GITHUB_WEBHOOK_URL:-}
      LINEAR_ENABLED: ${LINEAR_ENABLED:-false}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_TEAM_ID: ${LINEAR_TEAM_ID:-}
      LINEAR_API_URL: ${LINEAR_API_URL:-https://api.linear.app/graphql}
      JULES_MAX_CONCURRENT_SESSIONS_PER_ACCOUNT: ${JULES_MAX_CONCURRENT_SESSIONS_PER_ACCOUNT:-3}
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    depends_on:
      ml:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
